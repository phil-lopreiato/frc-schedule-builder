<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRC Schedule Builder</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="header-content">
        <h1>🤖 FRC Schedule Builder</h1>
        <p>Analyze how your qualification match schedule fits into the allotted event time</p>
      </div>
    </header>

    <main class="app-main">

      <!-- Step 1 — Load Event -->
      <section class="card" id="loader-card">
        <h2><span class="step-badge">1</span> Load Event</h2>
        <div class="input-row">
          <div class="input-group">
            <label for="event-key">Event Key</label>
            <input
              type="text"
              id="event-key"
              placeholder="e.g. 2024miket"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <button class="btn btn-primary" id="load-btn">Load Event</button>
        </div>
        <div id="load-error" class="alert alert-error hidden"></div>
        <div id="load-status" class="status-row hidden">
          <span class="spinner"></span>
          <span id="load-status-text">Loading…</span>
        </div>
      </section>

      <!-- Step 2 — Parameters -->
      <section class="card hidden" id="params-card">
        <h2><span class="step-badge">2</span> Schedule Parameters</h2>

        <div class="info-grid" id="event-info-grid">
          <!-- populated by JS -->
        </div>

        <div id="agenda-alert" class="alert hidden"></div>

        <div class="params-grid">
          <div class="input-group">
            <label for="matches-per-team">Matches per Team</label>
            <input type="number" id="matches-per-team" value="10" min="1" max="20" />
          </div>
          <div class="input-group">
            <label for="cycle-time">Cycle Time (min / match)</label>
            <input type="number" id="cycle-time" value="7" min="1" max="30" step="0.5" />
          </div>
          <div class="input-group">
            <label for="qual-time">
              Qual Time Available (min)
              <span class="label-badge" id="qual-time-badge" style="display:none"></span>
            </label>
            <input type="number" id="qual-time" min="1" placeholder="Minutes for qual matches" />
          </div>
        </div>

        <button class="btn btn-primary" id="calculate-btn">Calculate Schedule</button>
      </section>

      <!-- Step 3 — Results -->
      <section class="card hidden" id="results-card">
        <h2><span class="step-badge">3</span> Schedule Analysis</h2>
        <div id="results-content">
          <!-- populated by JS -->
        </div>
      </section>

    </main>

    <footer class="app-footer">
      <p>
        Match schedule data provided by
        <a href="https://www.thebluealliance.com" target="_blank" rel="noopener">The Blue Alliance</a>
      </p>
    </footer>

  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
